summarizer_default:
  default_model: openai/gpt-4o-mini
  default_litellm_params:
    temperature: 0.2
    max_tokens: 900
  fallbacks: []
  fallback_policy:
    num_retries: 2

extractor_default:
  default_model: openai/gpt-4o-mini
  default_litellm_params:
