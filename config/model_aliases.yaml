    max_tokens: 1200
  fallbacks: []
  fallback_policy:
    num_retries: 2

explainer_default:
  default_model: openai/gpt-4o-mini
  default_litellm_params:
    temperature: 0.1
    max_tokens: 1200
  fallbacks: []
  fallback_policy:
    num_retries: 2

embedding_default:
  default_model: text-embedding-3-small
  default_litellm_params: {}
  fallbacks: []
  fallback_policy:
    num_retries: 1
